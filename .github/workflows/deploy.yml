name: Deploy Web Compiler

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          docker compose -f docker-compose.prod.yml up -d --build

          sleep 10

          curl -f http://localhost/api/health
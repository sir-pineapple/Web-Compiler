name: Deploy Web Compiler

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy application
        run: |
          cd /home/dhruv/Documents/Web-Compiler

          git pull origin main
          
          docker compose -f docker-compose.prod.yml up -d --build

          sleep 10

          curl -f http://localhost:9080/api/health
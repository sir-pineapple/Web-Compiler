services:
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
  
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.prod
    env_file:
      - ./app/backend/.env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  
  worker:
    build:
      context: ./app/worker
      dockerfile: Dockerfile.prod
    env_file:
      - ./app/backend/.env
    depends_on:
      - redis
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app/worker/temp:/app/temp
    restart: unless-stopped
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
  
  postgres:
    image: postgres:17-alpine
    env_file:
      - ./app/backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    ports:
      - "9080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
  
  compiler-cpp:
    build:
      context: ./infra/docker/cpp
    image: compiler-cpp
  
  compiler-c:
    build:
      context: ./infra/docker/c
    image: compiler-c
  
  compiler-java:
    build:
      context: ./infra/docker/java
    image: compiler-java
  
  compiler-python:
    build:
      context: ./infra/docker/python
    image: compiler-python
  
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "9180:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data: